<!doctype html>
<html lang="en" class="sl-theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Predicion Game</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"
    ></script>
    <style>
      #main {
        margin-left: 10px;
        margin-right: 10px;
      }

      #gameCardContents {
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 20px;
      }

      #sequenceDisplay {
        text-align: center;
      }
    </style>
    <script defer>
      /*
        1, 3, 5, 7, 9 (start at 1, add by 2)
        4, 7, 10, 13, 16 (start at 4, add by 3)
        2, -1, -4, -7, -10 (start at 2, add by -3)
        */
      // i <- 0, 1, 2, 3, ...
      function addSeq(start, i, addVal) {
        return start + addVal * i;
      }

      function addSeqExplan(start, addVal) {
        return `Start at ${start}. Add by ${addVal} continuously.`;
      }

      /*
        1, 2, 4, 7, 11 (start at 1, add by 1, 2, 3, 4 ...)
        4, 7, 13, 22, 34 (start at 4, add by 3, 6, 9, 12)
        2, 4, 3, -1, -8 (start at 2, add by 2, -1, -4, -7)
        */
      // i <- 0, 1, 2, 3, ...
      function incAddSeq(start, startAddSeq, i, addVal) {
        let r = start;
        for (let j = 0; j < i; j++) {
          r += addSeq(startAddSeq, j, addVal);
        }
        return r;
      }

      function incAddSeqExplan(start, startAddSeq, addVal) {
        return `Start at ${start}. Add by the sequence ${startAddSeq}, ${startAddSeq + addVal}, ${startAddSeq + 2 * addVal}, ${startAddSeq + 3 * addVal}, ${startAddSeq + 4 * addVal}, ...`;
      }

      /*
        1, 2, 4, 8, 16 (start at 1, multiply by 2)
        4, 12, 36, 108, 324 (start at 4, multiply by 3)
        2, -6, 18, -54, 162 (start at 2, multiply by -3)
        */
      // i <- 0, 1, 2, 3, ...
      function multSeq(start, i, multVal) {
        return start * multVal ** i;
      }

      function multSeqExplan(start, multVal) {
        return `Start at ${start}. Multiply by ${multVal} continuously.`;
      }

      // i <- 0, 1, 2, 3, ...
      function incMultSeq(start, startMultSeq, i, multVal) {
        let r = start;
        for (let j = 0; j < i; j++) {
          r += multSeq(startMultSeq, j, multVal);
        }
        return r;
      }

      function incMultSeqExplan(start, startMultSeq, multVal) {
        return `Start at ${start}. Add by the sequence ${startMultSeq}, ${startMultSeq * multVal}, ${startMultSeq * multVal ** 2}, ${startMultSeq * multVal ** 3}, ${startMultSeq * multVal ** 4}, ...`;
      }

      // 1, 1, 2, 3, 5, 8, 13, ...
      // i <- 0, 1, 2, 3, ...
      function fibSeq(i) {
        if (i == 0 || i == 1) {
          return 1;
        } else {
          return fibSeq(i - 1) + fibSeq(i - 2);
        }
      }

      // i <- 0, 1, 2, 3, ...
      function incFibSeq(start, i) {
        let r = start;
        for (let j = 0; j < i; j++) {
          r += fibSeq(j);
        }
        return r;
      }

      function incFibSeqExplan(start) {
        return `Start at ${start}. Add by the Fibonacci sequence 1, 1, 2, 3, 5, 8, ...`;
      }

      function digSum(num) {
        let r = 0;
        digList = num.toString().split("").map(Number);
        for (let j = 0; j < digList.length; j++) {
          r += digList[j];
        }
        return r;
      }

      /*
        5, 10, 11, 13, 17, 25, 32, ... (start at 5,
          add digits
            10 = 5 + 5,
            11 = 10 + (1 + 0)
            13 = 11 + (1 + 1)
            )
        23, 28, 38, 49, 62, ... (start at 23, add digits)
        */
      // i <- 0, 1, 2, 3, ...
      function digSumSeq(start, i) {
        let r = start;
        for (let j = 0; j < i; j++) {
          r += digSum(r);
        }
        return r;
      }

      function incDigSumExplan(start) {
        return `Start at ${start}. Keep adding all the digits together and incrementing by the result.`;
      }

      // random integer between min and max
      // min and max are integers (+, -, 0)
      function randomInt(min, max) {
        let res = Math.floor(Math.random() * (max - min + 1) + min);
        return res;
      }

      window.addEventListener("DOMContentLoaded", () => {
        let sequenceDisplay = document.getElementById("sequenceDisplay");
        let answerDisplay = document.getElementById("answerDisplay");

        /*
        - addSeq
        - incAddSeq
        - multSeq
        - incMultSeq
        - incFibSeq
        - digSumSeq
        */

        let seqType = randomInt(0, 5);

        if (seqType == 0) {
          // addSeq

          let start = randomInt(-10, 10);
          let addVal = randomInt(-10, 10);

          let sequence = [];
          for (let i = 0; i < 5; i++) {
            sequence.push(addSeq(start, i, addVal));
          }

          sequenceDisplay.innerText = sequence.join(", ") + ", ?, ?, ?";

          answer = [
            addSeq(start, 5, addVal),
            addSeq(start, 6, addVal),
            addSeq(start, 7, addVal),
          ].join(", ");
          answerDisplay.innerText = `
            Answer: ${answer}

            Explanation: ${addSeqExplan(start, addVal)}
          `;
        } else if (seqType == 1) {
          // incAddSeq

          let start = randomInt(-10, 10);
          let startAddSeq = randomInt(-10, 10);
          let addVal = randomInt(-10, 10);

          let sequence = [];
          for (let i = 0; i < 5; i++) {
            sequence.push(incAddSeq(start, startAddSeq, i, addVal));
          }

          sequenceDisplay.innerText = sequence.join(", ") + ", ?, ?, ?";

          answer = [
            incAddSeq(start, startAddSeq, 5, addVal),
            incAddSeq(start, startAddSeq, 6, addVal),
            incAddSeq(start, startAddSeq, 7, addVal),
          ].join(", ");
          answerDisplay.innerText = `
            Answer: ${answer}

            Explanation: ${incAddSeqExplan(start, startAddSeq, addVal)}
          `;
        } else if (seqType == 2) {
          // multSeq

          let start = randomInt(-3, 3);
          let multVal = randomInt(-3, 3);

          let sequence = [];
          for (let i = 0; i < 5; i++) {
            sequence.push(multSeq(start, i, multVal));
          }

          sequenceDisplay.innerText = sequence.join(", ") + ", ?, ?, ?";

          answer = [
            multSeq(start, 5, multVal),
            multSeq(start, 6, multVal),
            multSeq(start, 7, multVal),
          ].join(", ");
          answerDisplay.innerText = `
            Answer: ${answer}

            Explanation: ${multSeqExplan(start, multVal)}
          `;
        } else if (seqType == 3) {
          // incMultSeq

          let start = randomInt(-10, 10);
          let startMultSeq = randomInt(-3, 3);
          let multVal = randomInt(-3, 3);

          let sequence = [];
          for (let i = 0; i < 5; i++) {
            sequence.push(incMultSeq(start, startMultSeq, i, multVal));
          }

          sequenceDisplay.innerText = sequence.join(", ") + ", ?, ?, ?";

          answer = [
            incMultSeq(start, startMultSeq, 5, multVal),
            incMultSeq(start, startMultSeq, 6, multVal),
            incMultSeq(start, startMultSeq, 7, multVal),
          ].join(", ");
          answerDisplay.innerText = `
            Answer: ${answer}

            Explanation: ${incMultSeqExplan(start, startMultSeq, multVal)}
          `;
        } else if (seqType == 4) {
          // incFibSeq

          let start = randomInt(-10, 10);

          let sequence = [];
          for (let i = 0; i < 5; i++) {
            sequence.push(incFibSeq(start, i));
          }

          sequenceDisplay.innerText = sequence.join(", ") + ", ?, ?, ?";

          answer = [
            incFibSeq(start, 5),
            incFibSeq(start, 6),
            incFibSeq(start, 7),
          ].join(", ");
          answerDisplay.innerText = `
            Answer: ${answer}

            Explanation: ${incFibSeqExplan(start)}
          `;
        } else if (seqType == 5) {
          // digSumSeq

          let start = randomInt(10, 50);

          let sequence = [];
          for (let i = 0; i < 5; i++) {
            sequence.push(digSumSeq(start, i));
          }

          sequenceDisplay.innerText = sequence.join(", ") + ", ?, ?, ?";

          answer = [
            digSumSeq(start, 5),
            digSumSeq(start, 6),
            digSumSeq(start, 7),
          ].join(", ");
          answerDisplay.innerText = `
            Answer: ${answer}

            Explanation: ${incDigSumExplan(start)}
          `;
        }
      });
    </script>
  </head>
  <body>
    <div id="main">
      <h1>Number Prediction Game</h1>
      <sl-card>
        <div id="gameCardContents">
          <div id="sequenceDisplay"></div>
          <sl-details id="answerDisplay" summary="See Answer"></sl-details>
          <sl-button onclick="window.location.reload()"> New Puzzle </sl-button>
        </div>
      </sl-card>
    </div>
  </body>
</html>
