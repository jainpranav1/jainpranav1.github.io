<!doctype html>
<html lang="en" class="wa-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feature Flagging Demo</title>
    <link
      rel="stylesheet"
      href="https://ka-f.webawesome.com/webawesome@3.9.0/styles/webawesome.css"
    />
    <script
      type="module"
      src="https://ka-f.webawesome.com/webawesome@3.9.0/webawesome.loader.js"
    ></script>

    <style>
      #main {
        margin-left: 10px;
        margin-right: 10px;
      }

      #kaprekarWindow {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
    </style>
    <script type="module" defer>
      import { withFeatureFlag } from "./featureFlags.js";

      function currentWay() {
        console.log("Curent way is enabled");
      }

      function padNumber(number) {
        return String(number).padStart(4, "0");
      }

      function kaprekarProcedure(number) {
        if (number > 9999 || number < 1) {
          return "Entered number is not in range 1 - 9999";
        }

        let output = "";
        output += `Start Number: ${padNumber(number)}\n`;

        let currNumber = number;
        let prevNumber = number + 1;

        let iteration = 0;
        const MAX_ITERATIONS = 1000;

        while (iteration < MAX_ITERATIONS) {
          const numberList = padNumber(currNumber).split("");
          const sortedNumberListLeastToGreatest = numberList.toSorted();
          const sortedNumberListGreatestToLeast =
            sortedNumberListLeastToGreatest.toReversed();

          const numberGreatestToLeast = Number(
            sortedNumberListGreatestToLeast.join(""),
          );
          const numberLeastToGreatest = Number(
            sortedNumberListLeastToGreatest.join(""),
          );
          const difference = numberGreatestToLeast - numberLeastToGreatest;

          output += `${padNumber(numberGreatestToLeast)} - ${padNumber(numberLeastToGreatest)} = ${padNumber(difference)}\n`;

          prevNumber = currNumber;
          currNumber = difference;

          if (currNumber === prevNumber) {
            break;
          }

          iteration += 1;
        }

        output += `Result: ${padNumber(currNumber)}`;
        return output;
      }

      function renderKaprekarResult(value) {
        const outputCard = document.getElementById("kaprekarOutput");
        outputCard.textContent = kaprekarProcedure(value);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const runButton = document.getElementById("kaprekarRunButton");
        const inputField = document.getElementById("kaprekarInput");

        runButton.addEventListener("click", () => {
          renderKaprekarResult(inputField.value);
        });
      });
    </script>
  </head>
  <body>
    <div id="main">
      <h1>Feature Flagging Demo</h1>

      <wa-card class="card-basic">
        <div id="kaprekarWindow">
          <wa-input
            id="kaprekarInput"
            type="number"
            label="Enter a number in the range 1 - 9999 (ex. 2841)"
          ></wa-input>
          <wa-button id="kaprekarRunButton" variant="primary"
            >Run Kaprekar</wa-button
          >
          <pre id="kaprekarOutput"></pre>
        </div>
      </wa-card>
    </div>
  </body>
</html>
