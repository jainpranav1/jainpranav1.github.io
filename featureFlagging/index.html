<!doctype html>
<html lang="en" class="wa-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feature Flagging Demo</title>
    <link
      rel="stylesheet"
      href="https://ka-f.webawesome.com/webawesome@3.9.0/styles/webawesome.css"
    />
    <script
      type="module"
      src="https://ka-f.webawesome.com/webawesome@3.9.0/webawesome.loader.js"
    ></script>

    <style>
      #main {
        margin-left: 10px;
        margin-right: 10px;
      }
    </style>
    <script type="module" defer>
      import { withFeatureFlag } from "./featureFlags.js";

      function currentWay() {
        console.log("Curent way is enabled");
      }

      function kaprekarProcedure(number) {
        let output = "";
        output += `Start Number: ${number}\n`;

        let currNumber = number;
        let prevNumber = number + 1;

        let iteration = 0;
        let MAX_ITERATIONS = 1000;

        while (iteration < MAX_ITERATIONS) {
          let numberList = String(currNumber).split("");

          let sortedNumberListLeastToGreatest = numberList.toSorted();
          let sortedNumberListGreatestToLeast =
            sortedNumberListLeastToGreatest.toReversed();

          let numberGreatestToLeast = Number(
            sortedNumberListGreatestToLeast.join(""),
          );
          let numberLeastToGreatest = Number(
            sortedNumberListLeastToGreatest.join(""),
          );

          let difference = numberGreatestToLeast - numberLeastToGreatest;

          output += `${numberGreatestToLeast} - ${numberLeastToGreatest} = ${difference}\n`;

          prevNumber = currNumber;
          currNumber = difference;

          if (currNumber === prevNumber) {
            break;
          }

          iteration += 1;
        }

        return output;
      }

      console.log(kaprekarProcedure(1429));

      //   function experimentalWay() {
      //     console.log("Experimental way is enabled");
      //   }

      //   const currentWayFlagged = withFeatureFlag("FEATURE_1", kaprekarProcedure);

      //   currentWayFlagged(); // runs only if FEATURE_1 is true
    </script>
  </head>
  <body>
    <div id="main">
      <h1>Feature Flagging Demo</h1>
      <wa-button variant="brand">Click me!</wa-button>
    </div>
  </body>
</html>
