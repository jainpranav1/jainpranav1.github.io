<!doctype html>
<html lang="en" class="sl-theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feature Flagging Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"
    ></script>
    <style>
      #main {
        margin-left: 10px;
        margin-right: 10px;
      }
    </style>
    <script type="module" defer>
      import { withFeatureFlag } from "./featureFlags.js";

      function currentWay() {
        console.log("Curent way is enabled");
      }

      function kaprekarProcedure(number) {
        let currNumber = number;

        for (let i = 0; i < 10; ++i) {
          let numberString = String(currNumber);
          let numberList = numberString.split("");

          let sortedNumberListLeastToGreatest = numberList.toSorted();
          let sortedNumberListGreatestToLeast =
            sortedNumberListLeastToGreatest.toReversed();

          let numberGreatestToLeast = Number(
            sortedNumberListGreatestToLeast.join(""),
          );
          let numberLeastToGreatest = Number(
            sortedNumberListLeastToGreatest.join(""),
          );

          console.log(`${numberGreatestToLeast} - ${numberLeastToGreatest}`);
          let difference = numberGreatestToLeast - numberLeastToGreatest;

          console.log(difference);

          currNumber = difference;
        }
      }

      kaprekarProcedure(1429);

      //   function experimentalWay() {
      //     console.log("Experimental way is enabled");
      //   }

      //   const currentWayFlagged = withFeatureFlag("FEATURE_1", kaprekarProcedure);

      //   currentWayFlagged(); // runs only if FEATURE_1 is true
    </script>
  </head>
  <body>
    <div id="main">
      <h1>Feature Flagging Demo</h1>
    </div>
  </body>
</html>
